name: iosApp
options:
  bundleIdPrefix: com.brazil.football.better.sport
  deploymentTarget:
    iOS: "16.6"
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "16.6"
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    PRODUCT_BUNDLE_IDENTIFIER: com.brazil.football.better.sport
targets:
  iosApp:
    type: application
    platform: iOS
    deploymentTarget: "16.6"
    sources:
      - path: iosApp
    configFiles:
      Debug: Configuration/Config.xcconfig
      Release: Configuration/Config.xcconfig
    info:
      path: iosApp/Info.plist
      properties:
        CFBundleDisplayName: Football Better Sport
        CFBundleName: Football-Better-Sport
        CADisableMinimumFrameDurationOnPhone: true
        LSRequiresIPhoneOS: true
        UIRequiresFullScreen: true
        UIStatusBarHidden: true
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brazil.football.better.sport
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "16.6"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        PRODUCT_NAME: "Football-Better-Sport"
